meters:
- name: seats
  description: Active users on a paid plan; the primary cost driver, billed per user per month.
  unit: users
  aggregation: max
  dimensions:
  - account
  - plan
- name: plan_tier
  description: Plan tier per seat (Free, Starter, Premium, Ultimate, Enterprise); determines the per-seat rate and which API-reachable features are unlocked.
  unit: tier
  aggregation: max
  dimensions:
  - account
- name: api_requests
  description: API requests consumed against the plan-based allowance; not billed, but throttled at 429 when exceeded.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - token
principles:
- name: Visibility
  description: Track active seats per plan tier monthly; the invoice is seats times rate, so seat drift is the main source of surprise cost.
- name: Allocation
  description: Map users to teams via TimeCamp groups so per-seat costs can be charged back to the departments whose time is being tracked.
- name: Optimization
  description: Bill annually for the roughly 30% discount, downgrade seats that do not use tier-gated features (approvals, billing rates, data export), and remove inactive users; API integrations are free, so automate instead of buying add-ons.
- name: Accountability
  description: Assign an owner for the TimeCamp account who reviews seat count, plan tier fit, and API 429 rates each billing cycle.
