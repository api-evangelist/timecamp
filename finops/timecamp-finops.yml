description: >-
  FinOps view of TimeCamp spend. TimeCamp is a per-seat SaaS subscription -
  cost is driven by the number of active users on a paid plan (Starter
  $3.99, Premium $6.99, Ultimate $9.99 per user per month billed annually;
  $5.49/$9.99/$13.99 month-to-month), not by API usage. The API carries no
  separate charge on any plan, including the free tier, so API-driven
  integrations add no direct marginal cost; the levers are seat count, plan
  tier (which gates features like approvals, billing rates, expenses, and
  data export), and the annual-versus-monthly billing choice. Enterprise
  agreements are custom-priced.
notes: >-
  Because the API is free and rate limits rather than metering govern usage,
  there is no usage-based invoice line to allocate - allocate seat costs
  instead. Watch for inactive seats and for users on a higher tier than the
  features they use require.
